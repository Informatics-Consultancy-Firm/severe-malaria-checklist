<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Severe Malaria Study — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,#1b6499,#0c2740);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:20px;padding:38px 30px;text-align:center;
    max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);border-top:5px solid #c8991a;}
  .icon{font-size:60px;margin-bottom:14px;}
  h1{color:#1b6499;font-size:21px;font-weight:700;letter-spacing:.4px;margin-bottom:12px;}
  p{color:#556;font-size:14px;line-height:1.7;margin-bottom:26px;}
  .btn{background:#1b6499;color:#fff;border:none;padding:13px 34px;font-size:14px;
    font-weight:700;border-radius:30px;cursor:pointer;letter-spacing:.4px;}
  .btn:active{transform:scale(.97);}
  .status{margin-top:18px;padding:11px 14px;background:#f0f4f8;border-radius:8px;
    font-size:12px;color:#607080;}
  .status.online{background:#e6f6f1;color:#2aa17c;}
  .note{margin-top:16px;font-size:11px;color:#aab;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Anything you have already entered is saved on this device and will sync automatically when you reconnect.</p>
  <button class="btn" onclick="tryAgain()">Try again</button>
  <div class="status" id="status">Checking connection…</div>
  <div class="note">ICF-SL · Severe Malaria Study · Data Collection</div>
</div>
<script>
  function tryAgain(){
    if(navigator.onLine){ location.href='./index.html'; }
    else { const s=document.getElementById('status'); s.textContent='Still offline — check your network and try again.'; s.className='status'; }
  }
  addEventListener('online',()=>{ const s=document.getElementById('status');
    s.textContent='Connection restored! Redirecting…'; s.className='status online';
    setTimeout(()=>location.href='./index.html',1000); });
  document.getElementById('status').textContent = navigator.onLine
    ? 'Connection available — tap Try again.' : 'No connection detected.';
</script>
</body>
</html>
