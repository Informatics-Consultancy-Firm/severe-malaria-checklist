<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Severe Malaria Study — Data Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- PWA (installable + offline) -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1b6499">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SM Study">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<style>
  :root{
    --sky-50:#f2f8fd; --sky-100:#e3f1fb; --sky-200:#c9e4f7; --sky-300:#9ed0f0;
    --sky-400:#6ab6e6; --sky-500:#3d9ad6; --sky-600:#2680bd; --sky-700:#1b6499;
    --ink:#14344d; --muted:#5f7f96; --line:#dceaf5; --white:#fff;
    --ok:#2aa17c; --ok-bg:#e6f6f1; --bad:#d95468; --bad-bg:#fceaed;
    --warn:#e0a100; --warn-bg:#fff7e0;
    --sh-sm:0 2px 8px rgba(38,128,189,.08);
    --sh-md:0 10px 30px rgba(38,128,189,.14);
    --sh-lg:0 26px 60px rgba(38,128,189,.22);
    --disp:'Oswald',system-ui,sans-serif; --body:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:var(--ink);background:var(--sky-50);display:flex;align-items:center;justify-content:center;padding:20px;}
  .phone{width:410px;max-width:100%;height:880px;max-height:96vh;background:#0c2740;border-radius:46px;padding:12px;box-shadow:var(--sh-lg);}
  .screen{position:relative;width:100%;height:100%;background:var(--white);border-radius:36px;overflow:hidden;}
  #app{position:absolute;inset:0;display:flex;flex-direction:column;}
  @media (max-width:540px){body{padding:0;}.phone{width:100%;height:100vh;max-height:none;border-radius:0;padding:0;}.screen{border-radius:0;}}

  .appbar{flex:0 0 auto;background:var(--sky-100);color:var(--sky-700);padding:15px 16px 13px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--sky-200);}
  .ico-btn{width:38px;height:38px;border:none;border-radius:12px;background:var(--white);color:var(--sky-600);display:grid;place-items:center;cursor:pointer;box-shadow:var(--sh-sm);flex:0 0 auto;}
  .ico-btn:active{transform:scale(.94);}
  .titles{min-width:0;flex:1;}
  .eyebrow{font:600 10px/1 var(--body);letter-spacing:.15em;text-transform:uppercase;color:var(--sky-500);}
  .title{font:600 16.5px/1.15 var(--disp);letter-spacing:.02em;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tag-pill{font:700 9.5px/1 var(--body);letter-spacing:.06em;padding:6px 8px;border-radius:7px;flex:0 0 auto;}
  .tag-pill.case{background:var(--bad-bg);color:var(--bad);}
  .tag-pill.ctrl{background:var(--ok-bg);color:var(--ok);}

  .progress-wrap{flex:0 0 auto;background:var(--sky-100);padding:0 16px 11px;}
  .progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .progress-row .step{font:600 11px/1 var(--body);color:var(--sky-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .progress-row .pct{font:600 11px/1 var(--body);color:var(--sky-500);flex:0 0 auto;padding-left:8px;}
  .track{height:6px;background:var(--white);border-radius:99px;overflow:hidden;}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--sky-400),var(--sky-600));border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}

  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .footer{flex:0 0 auto;background:var(--sky-100);border-top:1px solid var(--sky-200);padding:13px 16px calc(15px + env(safe-area-inset-bottom));display:flex;gap:10px;}

  .btn{font:600 15px/1 var(--body);border:none;border-radius:14px;padding:15px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,box-shadow .2s;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--sky-600);color:#fff;box-shadow:0 6px 16px rgba(38,128,189,.3);flex:1;}
  .btn-primary:disabled{background:var(--sky-200);color:#fff;box-shadow:none;cursor:not-allowed;}
  .btn-ghost{background:var(--white);color:var(--sky-600);box-shadow:var(--sh-sm);}
  .btn-danger{background:var(--bad-bg);color:var(--bad);box-shadow:none;}
  .btn-block{width:100%;}
  .btn-sm{padding:12px 14px;font-size:13.5px;}

  /* home */
  .hero{background:linear-gradient(160deg,var(--sky-500),var(--sky-700));color:#fff;padding:28px 22px 32px;border-bottom-left-radius:30px;border-bottom-right-radius:30px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-60px;top:-70px;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,.10);}
  .hero::before{content:"";position:absolute;right:20px;bottom:-80px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.07);}
  .hero .logo{position:relative;display:block;height:52px;width:auto;max-width:205px;background:#fff;border-radius:10px;padding:6px 10px;box-shadow:0 4px 14px rgba(0,0,0,.18);margin-bottom:2px;}
  .bar-logo{height:31px;width:auto;max-width:98px;flex:0 0 auto;background:#fff;border-radius:7px;padding:3px 6px;box-shadow:var(--sh-sm);}
  .hero h1{font:600 24px/1.18 var(--disp);margin:14px 0 8px;position:relative;}
  .hero p{font:400 12.5px/1.5 var(--body);color:rgba(255,255,255,.9);max-width:32ch;position:relative;}
  .home-inner{padding:20px 18px 26px;}

  .quota{background:var(--white);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:var(--sh-sm);}
  .quota h4{font:600 12px var(--body);color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .quota h4 .dot{width:8px;height:8px;border-radius:50%;background:var(--sky-500);}
  .qrow{margin-bottom:11px;}
  .qrow:last-child{margin-bottom:0;}
  .qtop{display:flex;justify-content:space-between;margin-bottom:5px;}
  .qtop .k{font:500 12px var(--body);}
  .qtop .v{font:600 12px var(--body);color:var(--muted);}
  .qtrack{height:8px;background:var(--sky-50);border-radius:99px;overflow:hidden;}
  .qfill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,.7,.2,1);}
  .qfill.case{background:linear-gradient(90deg,#e88b99,var(--bad));}
  .qfill.ctrl{background:linear-gradient(90deg,#66c4a8,var(--ok));}
  .quota h4{display:flex;align-items:center;}
  .hosp-split{margin-top:13px;padding-top:11px;border-top:1px dashed var(--line);}
  .hs{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
  .hs .hn{font:700 10.5px var(--disp);letter-spacing:.06em;color:var(--sky-600);}
  .hs .hv{font:500 11px var(--body);color:var(--muted);}
  .hs-key{font:400 9.5px var(--body);color:var(--sky-300);margin-top:5px;text-align:right;}

  .section-eyebrow{font:600 11px/1 var(--body);letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin:0 0 11px 2px;}
  .action-card{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:var(--white);border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:12px;cursor:pointer;box-shadow:var(--sh-sm);transition:transform .12s,box-shadow .2s;}
  .action-card:active{transform:scale(.98);}
  .action-card:hover{box-shadow:var(--sh-md);}
  .action-card .ic{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;flex:0 0 auto;}
  .action-card .ic.b{background:var(--sky-100);color:var(--sky-600);}
  .action-card .ic.g{background:var(--ok-bg);color:var(--ok);}
  .action-card .ic.y{background:var(--warn-bg);color:#b8860b;}
  .action-card .tx{flex:1;min-width:0;}
  .action-card .tx h3{font:600 16.5px/1.1 var(--disp);margin-bottom:3px;}
  .action-card .tx span{font:400 12px/1.4 var(--body);color:var(--muted);}
  .action-card .arrow{color:var(--sky-300);flex:0 0 auto;}

  /* form */
  .form{padding:18px 16px 26px;}
  .inst-banner{border-radius:16px;padding:15px 16px;margin-bottom:14px;color:#fff;}
  .inst-banner.i1{background:linear-gradient(160deg,var(--sky-500),var(--sky-700));}
  .inst-banner.i2{background:linear-gradient(160deg,#5aa8bf,#1b6499);}
  .inst-banner .n{font:600 10px/1 var(--body);letter-spacing:.14em;text-transform:uppercase;opacity:.85;}
  .inst-banner h2{font:600 18px/1.2 var(--disp);margin:6px 0 4px;}
  .inst-banner p{font:400 11.5px/1.45 var(--body);opacity:.92;}

  .q-card{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:11px;box-shadow:var(--sh-sm);scroll-margin-top:14px;transition:border-color .15s,box-shadow .15s;}
  .q-card.missing{border-color:var(--bad);box-shadow:0 0 0 3px rgba(217,84,104,.13);}
  .q-card.skipped{opacity:.5;}
  .q-no{display:inline-block;font:700 10px/1 var(--body);letter-spacing:.08em;color:var(--sky-600);background:var(--sky-50);border:1px solid var(--sky-200);padding:5px 8px;border-radius:6px;margin-bottom:9px;}
  .q-txt{font:500 15px/1.32 var(--body);color:var(--ink);margin-bottom:4px;}
  .q-txt .req{color:var(--bad);margin-left:2px;}
  .q-help{font:400 11.5px/1.45 var(--body);color:var(--muted);margin-bottom:11px;}
  .q-card .q-txt+.opts,.q-card .q-txt+.field,.q-card .q-txt+.chips{margin-top:11px;}

  .skip-note{font:400 11.5px/1.45 var(--body);color:var(--sky-700);background:var(--sky-50);border:1px dashed var(--sky-300);border-radius:10px;padding:9px 11px;}

  /* consent */
  .inst-banner.i0{background:linear-gradient(160deg,#2aa17c,#15705a);}
  .cons-sheet{background:var(--sky-50);border:1px solid var(--sky-200);border-radius:13px;padding:13px 14px;}
  .cons-sheet h5{font:600 13px/1.3 var(--disp);letter-spacing:.02em;color:var(--sky-700);margin-bottom:7px;}
  .cons-sheet p{font:400 11.8px/1.5 var(--body);color:var(--ink);margin-bottom:8px;}
  .cons-sheet p:last-child{margin-bottom:0;}
  .cons-sheet b{font-weight:600;}
  .cons-sheet .kv{font:400 11.5px/1.55 var(--body);color:var(--muted);margin-bottom:8px;}
  .cons-sheet details{margin-top:4px;}
  .cons-sheet summary{font:600 11.5px/1 var(--body);color:var(--sky-600);cursor:pointer;padding:7px 0;list-style:none;}
  .cons-sheet summary::-webkit-details-marker{display:none;}
  .cons-sheet summary::after{content:" ▾";}
  .cons-sheet details[open] summary::after{content:" ▴";}
  .cons-sheet .sec{font:600 11.5px/1.3 var(--body);color:var(--ink);margin:10px 0 4px;}
  .cons-sheet ul{margin:0 0 8px 15px;}
  .cons-sheet li{font:400 11.5px/1.5 var(--body);color:var(--ink);margin-bottom:3px;}

  /* follow-up day cards */
  .fu-grid{display:flex;flex-direction:column;gap:8px;}
  .fu-card{border:1.5px solid var(--line);border-radius:12px;background:var(--white);overflow:hidden;transition:.13s;}
  .fu-head{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;font:600 14px/1.2 var(--body);color:var(--ink);}
  .fu-card .fu-n{width:26px;height:26px;border-radius:8px;background:var(--sky-50);border:1.5px solid var(--sky-200);color:var(--sky-700);display:grid;place-items:center;font:700 11px var(--body);flex:0 0 auto;}
  .fu-card .fu-badge{margin-left:auto;font:700 8.5px/1 var(--body);letter-spacing:.06em;text-transform:uppercase;padding:5px 8px;border-radius:99px;background:var(--sky-100);color:var(--sky-700);}
  .fu-card.done{border-color:var(--ok);}
  .fu-card.done .fu-n{background:var(--ok);border-color:var(--ok);color:#fff;}
  .fu-card.done .fu-badge{background:var(--ok-bg);color:var(--ok);}
  .fu-card.open{border-color:var(--sky-500);box-shadow:0 0 0 3px rgba(61,154,214,.12);}
  .fu-card.locked{opacity:.6;background:#f6f9fc;}
  .fu-card.locked .fu-head{cursor:not-allowed;}
  .fu-card.locked .fu-n{background:#eef2f5;border-color:var(--line);color:var(--muted);}
  .fu-card.locked .fu-badge{background:#eef2f5;color:var(--muted);}
  .fu-body{padding:0 14px 13px;border-top:1px solid var(--line);}
  .fu-body .sub-lbl:first-child{margin-top:11px;}

  .dec{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);cursor:pointer;font:500 12.8px/1.45 var(--body);color:var(--ink);transition:.13s;}
  .dec:hover{border-color:var(--sky-300);}
  .dec .bx{width:20px;height:20px;border-radius:6px;border:2px solid var(--sky-200);flex:0 0 auto;display:grid;place-items:center;margin-top:1px;}
  .dec .bx svg{opacity:0;transform:scale(.5);transition:.15s;}
  .dec.on{border-color:var(--ok);background:var(--ok-bg);box-shadow:0 0 0 3px rgba(42,161,124,.12);}
  .dec.on .bx{background:var(--ok);border-color:var(--ok);}
  .dec.on .bx svg{opacity:1;transform:scale(1);}

  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{display:flex;align-items:center;gap:11px;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);cursor:pointer;font:500 14px/1.3 var(--body);color:var(--ink);transition:.13s;}
  .opt:hover{border-color:var(--sky-300);}
  .opt .mark{width:20px;height:20px;border-radius:50%;border:2px solid var(--sky-200);flex:0 0 auto;display:grid;place-items:center;}
  .opt .mark::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--sky-600);transform:scale(0);transition:transform .15s;}
  .opt.sel{border-color:var(--sky-500);background:var(--sky-50);box-shadow:0 0 0 3px rgba(61,154,214,.12);}
  .opt.sel .mark{border-color:var(--sky-600);}
  .opt.sel .mark::after{transform:scale(1);}
  .opt.yes.sel{border-color:var(--ok);background:var(--ok-bg);box-shadow:0 0 0 3px rgba(42,161,124,.12);}
  .opt.yes.sel .mark{border-color:var(--ok);} .opt.yes.sel .mark::after{background:var(--ok);}
  .opt.no.sel{border-color:var(--bad);background:var(--bad-bg);box-shadow:0 0 0 3px rgba(217,84,104,.12);}
  .opt.no.sel .mark{border-color:var(--bad);} .opt.no.sel .mark::after{background:var(--bad);}

  /* multi-select chips */
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;background:var(--white);cursor:pointer;font:500 13px/1.2 var(--body);color:var(--ink);transition:.13s;}
  .chip:hover{border-color:var(--sky-300);}
  .chip .bx{width:16px;height:16px;border-radius:5px;border:2px solid var(--sky-200);flex:0 0 auto;display:grid;place-items:center;}
  .chip .bx svg{opacity:0;transform:scale(.5);transition:.15s;}
  .chip.sel{border-color:var(--sky-500);background:var(--sky-50);box-shadow:0 0 0 3px rgba(61,154,214,.1);}
  .chip.sel .bx{background:var(--sky-600);border-color:var(--sky-600);}
  .chip.sel .bx svg{opacity:1;transform:scale(1);}
  .chip.none.sel{border-color:var(--muted);background:#eef2f5;box-shadow:none;}
  .chip.none.sel .bx{background:var(--muted);border-color:var(--muted);}

  .field input,.field select,.field textarea{width:100%;font:500 15px var(--body);color:var(--ink);padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);outline:none;transition:.15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sky-500);box-shadow:0 0 0 3px rgba(61,154,214,.13);}
  .field input[readonly]{background:var(--sky-50);font-family:var(--disp);letter-spacing:.05em;color:var(--sky-700);font-size:17px;}
  .field textarea{resize:vertical;min-height:74px;font-size:14px;}
  .unit{position:relative;}
  .unit .u{position:absolute;right:13px;top:50%;transform:translateY(-50%);font:600 12px var(--body);color:var(--muted);pointer-events:none;}
  .unit input{padding-right:52px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .other-box{margin-top:9px;}
  .other-box input{width:100%;font:500 14px var(--body);padding:12px 13px;border:1.5px solid var(--sky-300);border-radius:11px;outline:none;}
  .sub-lbl{font:600 11px var(--body);color:var(--muted);margin:11px 0 6px;}
  .flag{margin-top:9px;font:500 11.5px/1.4 var(--body);padding:8px 10px;border-radius:9px;}
  .flag.warn{background:var(--warn-bg);color:#8a6d00;border:1px solid #f0dda0;}
  .flag.bad{background:var(--bad-bg);color:var(--bad);border:1px solid #f2ccd2;}
  .flag.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #bfe6d6;}

  .ver{text-align:center;font:500 10px/1.4 var(--body);color:var(--muted);margin-top:12px;letter-spacing:.02em;}

  /* review + done */
  .rv-count{font:500 11px/1.5 var(--body);color:var(--sky-700);background:var(--sky-50);border:1px dashed var(--sky-300);border-radius:10px;padding:9px 11px;margin-bottom:12px;}
  .rv{padding:18px 16px 26px;}
  .rv-head{background:linear-gradient(160deg,var(--sky-500),var(--sky-700));color:#fff;border-radius:16px;padding:16px;margin-bottom:14px;}
  .rv-head .id{font:700 20px var(--disp);letter-spacing:.05em;}
  .rv-head .meta{font:400 11.5px var(--body);opacity:.9;margin-top:4px;}
  .rv-sec{font:600 10.5px var(--body);letter-spacing:.12em;text-transform:uppercase;color:var(--sky-600);margin:16px 2px 8px;}
  .rv-item{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .rv-item .q{font:400 12px/1.35 var(--body);color:var(--muted);flex:1;}
  .rv-item .a{font:600 12.5px/1.35 var(--body);color:var(--ink);text-align:right;flex:0 0 44%;word-break:break-word;}
  .rv-item .a.empty{color:var(--bad);font-weight:500;}

  .done{padding:52px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;}
  .done .circle{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;margin-bottom:22px;background:var(--ok-bg);color:var(--ok);animation:pop .5s cubic-bezier(.2,.8,.2,1);}
  @keyframes pop{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
  .done h2{font:600 23px/1.2 var(--disp);margin-bottom:8px;}
  .done .idbig{font:700 18px var(--disp);letter-spacing:.05em;color:var(--sky-600);margin-bottom:10px;}
  .done p{font:400 13px/1.55 var(--body);color:var(--muted);max-width:30ch;margin-bottom:14px;}
  .done .sync{font:600 12px var(--body);padding:6px 12px;border-radius:99px;margin-bottom:20px;}
  .done .sync.on{background:var(--ok-bg);color:var(--ok);}
  .done .sync.checking{background:var(--sky-50);color:var(--sky-600);}
  .done .sync.warn{background:var(--warn-bg);color:#b8860b;}
  .done .actions{width:100%;display:flex;flex-direction:column;gap:10px;}

  /* lists + dash */
  .list{padding:18px 16px 28px;}
  .list h2{font:600 20px/1 var(--disp);}
  .sub{font:400 12px/1.4 var(--body);color:var(--muted);margin:6px 0 13px;}
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:13px;box-shadow:var(--sh-sm);}
  .card h4{font:600 12.5px var(--body);margin-bottom:13px;display:flex;align-items:center;gap:8px;}
  .card h4 .dot{width:8px;height:8px;border-radius:50%;background:var(--sky-500);}
  .li{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);}
  .li:last-child{border-bottom:none;}
  .li .av{width:44px;height:44px;border-radius:12px;background:var(--sky-50);color:var(--sky-600);display:grid;place-items:center;font:600 10.5px var(--disp);flex:0 0 auto;letter-spacing:.03em;}
  .li .m{flex:1;min-width:0;}
  .li .m .t{font:600 13px var(--body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .li .m .s{font:400 11px var(--body);color:var(--muted);margin-top:2px;}
  .pill{font:600 9.5px/1 var(--body);padding:6px 8px;border-radius:99px;flex:0 0 auto;letter-spacing:.04em;}
  .pill.case{background:var(--bad-bg);color:var(--bad);}
  .pill.ctrl{background:var(--ok-bg);color:var(--ok);}
  .pill.cgp{background:var(--sky-100);color:var(--sky-700);}
  .seg{display:flex;background:var(--sky-50);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:13px;}
  .seg button{flex:1;border:none;background:transparent;font:600 11.5px var(--body);color:var(--muted);padding:9px 4px;border-radius:9px;cursor:pointer;}
  .seg button.on{background:var(--white);color:var(--sky-700);box-shadow:var(--sh-sm);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;}
  .stat{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--sh-sm);}
  .stat .n{font:700 25px/1 var(--disp);color:var(--sky-600);}
  .stat .n.r{color:var(--bad);} .stat .n.g{color:var(--ok);}
  .stat .l{font:500 11px/1.3 var(--body);color:var(--muted);margin-top:6px;}
  .bar-row{margin-bottom:10px;}
  .bar-top{display:flex;justify-content:space-between;margin-bottom:4px;}
  .bar-top .k{font:500 11.5px var(--body);}
  .bar-top .v{font:600 11.5px var(--body);color:var(--muted);}
  .bar-track{height:8px;background:var(--sky-50);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sky-400),var(--sky-600));}
  .bar-fill.r{background:linear-gradient(90deg,#e88b99,var(--bad));}
  .empty{text-align:center;padding:42px 18px;}
  .empty .ic{width:74px;height:74px;margin:0 auto 16px;border-radius:22px;background:var(--sky-50);color:var(--sky-300);display:grid;place-items:center;}
  .empty h3{font:600 17px var(--disp);margin-bottom:8px;}
  .empty p{font:400 12.5px/1.5 var(--body);color:var(--muted);max-width:27ch;margin:0 auto 20px;}
  .spin{width:32px;height:32px;border:3px solid var(--sky-100);border-top-color:var(--sky-500);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .tools{display:flex;gap:9px;margin-top:5px;}
  .tools .btn{flex:1;font-size:12.5px;padding:12px 6px;}
  .toast{position:absolute;left:50%;bottom:94px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font:500 12.5px var(--body);padding:11px 17px;border-radius:12px;box-shadow:var(--sh-md);opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .sync-bar{display:flex;align-items:center;gap:10px;border-radius:14px;padding:12px 13px;margin-bottom:13px;border:1px solid;}
  .sync-bar .d{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .sync-bar .t{flex:1;font:400 11.5px/1.45 var(--body);}
  .sync-bar.ok{background:var(--ok-bg);border-color:#bfe6d6;color:#1a7a5e;}
  .sync-bar.ok .d{background:var(--ok);}
  .sync-bar.warn{background:var(--warn-bg);border-color:#f0dda0;color:#8a6d00;}
  .sync-bar.warn .d{background:var(--warn);}
  .sync-bar.wait{background:var(--sky-50);border-color:var(--sky-200);color:var(--sky-700);}
  .sync-bar.wait .d{background:var(--sky-400);animation:pulse 1.6s ease-in-out infinite;}
  .sync-bar.off{background:#f4f6f8;border-color:#dfe5ea;color:var(--muted);}
  .sync-bar.off .d{background:var(--muted);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  .sdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;margin-left:2px;}
  .sdot.ok{background:var(--ok);}
  .sdot.wait{background:var(--warn);}
  .done .sync.queued{background:var(--sky-50);color:var(--sky-700);}
  .draft{display:flex;align-items:center;gap:10px;background:var(--warn-bg);border:1px solid #f0dda0;border-radius:14px;padding:12px 14px;margin-bottom:14px;}
  .draft .t{flex:1;font:500 12px/1.4 var(--body);color:#8a6d00;}

  /* ---- matched-set cards (115, sequential) ---- */
  .sets-note{font:400 12px/1.5 var(--body);color:var(--muted);margin:2px 0 14px;}
  .inelig{margin-top:9px;padding:9px 11px;border-radius:11px;font:500 11.5px/1.45 var(--body);
    background:var(--bad-bg);border:1px solid #f0c4c4;color:var(--bad);}
  .inelig.ok{background:var(--ok-bg);border-color:#bfe6c8;color:var(--ok);}
  .set-sec{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:16px 2px 9px;padding-bottom:7px;border-bottom:1px solid var(--line);}
  .set-sec .hn{font:600 12.5px/1.15 var(--disp);letter-spacing:.02em;color:var(--sky-700);}
  .set-sec .rg{font:500 10px/1 var(--body);color:var(--muted);flex:0 0 auto;}
  .set-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .set-card{position:relative;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:13px 13px 12px;box-shadow:var(--sh-sm);text-align:left;cursor:pointer;transition:transform .12s,box-shadow .2s,border-color .15s;}
  .set-card:active{transform:scale(.98);}
  .set-card .sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .set-card .sc-no{font:700 15px/1 var(--disp);letter-spacing:.03em;color:var(--ink);}
  .set-card .sc-badge{font:700 8.5px/1 var(--body);letter-spacing:.06em;text-transform:uppercase;padding:5px 7px;border-radius:99px;}
  .set-card .dots{display:flex;gap:6px;}
  .set-card .dots .d{flex:1;height:6px;border-radius:99px;background:var(--sky-50);border:1px solid var(--line);position:relative;overflow:hidden;}
  .set-card .dots .d.done{background:var(--ok);border-color:var(--ok);}
  .set-card .dots .d.next{background:var(--sky-400);border-color:var(--sky-400);}
  .set-card .sc-lbl{display:flex;gap:6px;margin-top:6px;}
  .set-card .sc-lbl span{flex:1;text-align:center;font:600 8px/1 var(--body);letter-spacing:.04em;color:var(--muted);text-transform:uppercase;}
  /* states */
  .set-card.current{border-color:var(--sky-500);box-shadow:0 0 0 3px rgba(61,154,214,.14),var(--sh-sm);}
  .set-card.current .sc-badge{background:var(--sky-100);color:var(--sky-700);}
  .set-card.complete .sc-badge{background:var(--ok-bg);color:var(--ok);}
  .set-card.open{border-color:var(--warn);}
  .set-card.open .sc-badge{background:var(--warn-bg);color:#8a6d00;}
  .set-card.locked{cursor:not-allowed;opacity:.62;background:#f6f9fc;}
  .set-card.locked .sc-badge{background:#eef2f5;color:var(--muted);}
  .set-card.locked .sc-no{color:var(--muted);}

  /* ---- one card detail: three slots ---- */
  .slot{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:var(--sh-sm);transition:transform .12s,box-shadow .2s;}
  .slot.tap{cursor:pointer;}
  .slot.tap:active{transform:scale(.98);}
  .slot.tap:hover{box-shadow:var(--sh-md);}
  .slot .si{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;flex:0 0 auto;font:700 13px var(--disp);}
  .slot .si.case{background:var(--bad-bg);color:var(--bad);}
  .slot .si.ctrl{background:var(--ok-bg);color:var(--ok);}
  .slot .si.cg{background:var(--sky-100);color:var(--sky-700);}
  .person{margin-bottom:16px;}
  .person-hd{font:700 11px/1 var(--body);letter-spacing:.05em;text-transform:uppercase;color:var(--sky-700);margin:0 2px 8px;}
  .person .slot{margin-bottom:9px;}
  .slot .si.lock{background:#eef2f5;color:var(--muted);}
  .slot .st{flex:1;min-width:0;}
  .slot .st h3{font:600 15.5px/1.15 var(--disp);}
  .slot .st .cg{font:400 11.5px/1.4 var(--body);color:var(--muted);margin-top:2px;}
  .slot .stt{font:700 9px/1 var(--body);letter-spacing:.06em;text-transform:uppercase;padding:6px 8px;border-radius:99px;flex:0 0 auto;}
  .slot .stt.done{background:var(--ok-bg);color:var(--ok);}
  .slot .stt.go{background:var(--sky-100);color:var(--sky-700);}
  .slot .stt.wait{background:#eef2f5;color:var(--muted);}
  .slot.locked{opacity:.6;background:#f6f9fc;}
  .set-head{background:linear-gradient(160deg,var(--sky-500),var(--sky-700));color:#fff;border-radius:16px;padding:16px;margin-bottom:15px;}
  .set-head .id{font:700 20px var(--disp);letter-spacing:.04em;}
  .set-head .meta{font:400 11.5px/1.45 var(--body);opacity:.92;margin-top:5px;}
</style>
</head>

const Store=(()=>{let ok=false,mem={};try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true;}catch(e){}
 return{get(k,d){if(ok){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}}return k in mem?mem[k]:d;},
        set(k,v){if(ok){try{localStorage.setItem(k,JSON.stringify(v));return;}catch(e){}}mem[k]=v;},
        del(k){if(ok){try{localStorage.removeItem(k);return;}catch(e){}}delete mem[k];}};})();
const REC_KEY='sm_records_v1', URL_KEY='sm_gas_url_v1', ME_KEY='sm_interviewer_v1', DRAFT_KEY='sm_draft_v1';
const UPD_KEY='sm_last_update_v1';
/* Bump this whenever a new build is put on the server. It is what the Update
   button reports, so a fieldworker can read it back to you over the phone. */
const APP_VERSION='2026.07.22';
let records=Store.get(REC_KEY,[]);
GAS_URL=Store.get(URL_KEY,GAS_URL)||GAS_URL;
let interviewer=Store.get(ME_KEY,'');

/* =========================================================
   STUDY CONSTANTS
   ========================================================= */
const HOSPITALS=[
  {name:"Ola During Children's Hospital", code:'ODCH', district:'Western Area Urban', cases:43, controls:86},
  {name:'Bo Government Hospital',         code:'BGH',  district:'Bo',                 cases:32, controls:64},
  {name:'Koidu Government Hospital',      code:'KGH',  district:'Kono',               cases:22, controls:44},
  {name:'Magburaka Government Hospital',  code:'MGH',  district:'Tonkolili',          cases:18, controls:36}
];
const DISTRICTS=['Bo','Bombali','Bonthe','Falaba','Kailahun','Kambia','Karene','Kenema','Koinadugu','Kono',
                 'Moyamba','Port Loko','Pujehun','Tonkolili','Western Area Rural','Western Area Urban'];
function hospDistrict(name){ const h=HOSPITALS.find(x=>x.name===name); return h?h.district:''; }
/* Each set number belongs to a hospital, in blocks sized by its case quota:
     Ola During  43 -> sets 1–43
     Bo Govt     32 -> sets 44–75
     Koidu/Kono  22 -> sets 76–97
     Magburaka   18 -> sets 98–115   (43+32+22+18 = 115) */
function hospForSet(n){
  let start=1;
  for(const h of HOSPITALS){ const end=start+h.cases-1; if(n>=start&&n<=end) return h; start=end+1; }
  return HOSPITALS[HOSPITALS.length-1];
}
function setRange(h){
  let start=1;
  for(const x of HOSPITALS){ const end=start+x.cases-1; if(x===h) return [start,end]; start=end+1; }
  return [1,TOTAL_SETS];
}
const WHO_SIGNS=['Severe anaemia','Convulsions','Prostration','Coma','Respiratory distress','Hypoglycaemia','Shock','Jaundice','Haemoglobinuria'];
/* daily follow-up wellbeing — tick every one present that day */
const WELLBEING=['Fever','Convulsion','Lethargy'];
/* older records stored a single string here, newer ones an array */
const wellArr=v=>Array.isArray(v)?v:(v?[v]:[]);
const fuVal=(a,d,f)=>a['E28_d'+d+'_'+f];
/* a follow-up day is DONE only when all three answers are in */
function fuDayDone(a,d){
  return wellArr(fuVal(a,d,'well')).length>0
      && String(fuVal(a,d,'pd')??'').trim()!==''
      && String(fuVal(a,d,'hb')??'').trim()!=='';
}
/* anything at all entered for that day */
function fuDayStarted(a,d){
  return wellArr(fuVal(a,d,'well')).length>0
      || String(fuVal(a,d,'pd')??'').trim()!==''
      || String(fuVal(a,d,'hb')??'').trim()!=='';
}
/* days run in order: Day 1 is always open, Day n waits for Day n-1 */
function fuUnlocked(a,d){ return d===1 || fuDayDone(a,d-1); }
/* Day 1 must be complete, and no half-finished day may be left behind */
function fuComplete(a){
  if(!fuDayDone(a,1)) return false;
  for(let d=2;d<=5;d++){ if(fuDayStarted(a,d)&&!fuDayDone(a,d)) return false; }
  return true;
}
let fuOpenDay=0;   /* which day card is expanded */
function fuOpen(d){
  if(!fuUnlocked(ans,d)){ toast('Finish Day '+(d-1)+' first'); return; }
  fuOpenDay = (fuOpenDay===d ? 0 : d);
  saveDraft(); renderPage();
}
/* keep the card badges honest while a day is being typed into, without
   re-rendering the page and stealing focus from the input */
function refreshFuCards(){
  for(let d=1;d<=5;d++){
    const el=document.getElementById('fu_'+d); if(!el) continue;
    const done=fuDayDone(ans,d), unl=fuUnlocked(ans,d), open=(fuOpenDay===d);
    el.className='fu-card'+(done?' done':'')+(unl?'':' locked')+(open?' open':'');
    const b=el.querySelector('.fu-badge');
    if(b) b.textContent = done?'Complete' : !unl?'Locked' : open?'Open':'Start';
  }
}

/* join name parts into a single display name */
function fullName(first,middle,last){ return [first,middle,last].map(s=>String(s||'').trim()).filter(Boolean).join(' '); }
/* normalise a record's child name for duplicate comparison */
function normName(r){
  const nm=r.childName||fullName(r.childFirst,r.childMiddle,r.childLast);
  return String(nm||'').trim().toLowerCase().replace(/\s+/g,' ');
}
/* a child (same first/middle/last name AND same date of birth) may be enrolled
   only once across the whole study — as a case OR a control, never twice */
function findDuplicate(a){
  const nm=normName(a), dob=String(a.A1||'').trim();
  if(!nm||!dob) return null;
  const all=records.concat(Array.isArray(dashData)?dashData:[]);
  return all.find(r=>String(r._id)!==String(a.studyId) && normName(r)===nm && String(r.A1||'').trim()===dob) || null;
}
/* age in whole months from a date-of-birth string */
function ageMonths(dob){
  if(!dob) return '';
  const b=new Date(dob), now=new Date();
  if(isNaN(b)) return '';
  let m=(now.getFullYear()-b.getFullYear())*12+(now.getMonth()-b.getMonth());
  if(now.getDate()<b.getDate()) m--;
  return m<0?'':m;
}
function eligible(a){ const m=ageMonths(a.A1); return !(m!=='' && m>59); }
/* three study age bands, chosen automatically from age in months */
function ageGroupOf(dob){
  const m=ageMonths(dob);
  if(m===''||m>59) return '';
  if(m<=11) return '0 to 11 months';
  if(m<=23) return '12 to 23 months';
  return '24 to 59 months';
}

/* Matched design IDs:

                            sites/devices via the sheet, falling back to this
                            device when offline; the server de-duplicates too)
     Control -> "Control Na" / "Control Nb"  (N = the matched case number the
                            fieldworker enters, slot = a or b)
   The caregiver is part of the child's own record and shares its study ID. */
function genStudyId(a){
  if(!a.group) return '';
  if(isCase(a)){
    if(a.setNo!=null && a.setNo!=='') return 'Case '+parseInt(a.setNo,10);
    const live = (liveCounts&&liveCounts!=='error')
      ? dashData.filter(r=>String(r._form||'child')!=='caregiver'&&String(r._group)==='Case').length : 0;
    const local = records.filter(r=>isCase(r)).length;
    return 'Case '+(Math.max(live,local)+1);
  }
  const n=parseInt(a.matchCase,10);
  const slot=String(a.ctrlSlot||'').trim().toLowerCase();
  if(!n||(slot!=='a'&&slot!=='b')) return '';
  return 'Control '+n+slot;
}

function isOptional(q,a){ a=a||ans; return typeof q.optional==='function' ? !!q.optional(a) : !!q.optional; }
/* `qc` is the wording to use when the record is a control */
function qText(q,a){ a=a||ans; return (q.qc && isControl(a)) ? q.qc : q.q; }
function answered(q){
  if(q.type==='progress') return fuComplete(ans);
  if(isOptional(q)||q.type==='auto'||q.type==='agecalc'||q.type==='agegroup'||q.type==='note') return true;
  if(q.type==='autofill') return !!String(q.from(ans)||'').trim();
  const v=ans[q.id];
  if(q.type==='multi'){
    const arr=Array.isArray(v)?v:[];
    if(!arr.length) return false;
    if(q.other&&arr.indexOf('Other')>-1&&!String(ans[q.id+'_other']||'').trim()) return false;
    return true;
  }
  if(v===undefined||v===null||String(v).trim()==='') return false;
  if(q.other&&v==='Other'&&!String(ans[q.id+'_other']||'').trim()) return false;
  return true;
}

/* =========================================================
   MATCHED-SET CARDS  (115 sets, unlocked in sequence)
   ---------------------------------------------------------
   Each set = 1 case + 2 controls (a, b), all sharing one number.
   Rules the fieldworker asked for:
     • 115 cards, all closed; only the current one opens.
     • Within a card the CASE must be done first — the two controls
       stay locked until the case is recorded.
     • A card cannot be started until the one before it is complete,
       so Case 3 can't be taken before Cases 1 and 2.
   Completion is read from this device AND the live sheet, so a set
   another phone already finished counts as done here too.
   ========================================================= */
const TOTAL_SETS=115;
function childIdOf(setNo,kind){ return kind==='case' ? 'Case '+setNo : 'Control '+setNo+kind; }
/* which slot a saved record is: 'case', 'a' or 'b' */
function slotKindOf(r){
  if(isCase(r)||String(r._group)==='Case') return 'case';
  if(r.ctrlSlot==='a'||r.ctrlSlot==='b') return r.ctrlSlot;
  const last=String(r._id||'').slice(-1);
  return (last==='a'||last==='b')?last:'a';
}
function recDone(id){
  return records.some(r=>String(r._id)===id) ||
         (Array.isArray(dashData)&&dashData.some(r=>String(r._id)===id));
}
function childNameOf(setNo,kind){
  const id=childIdOf(setNo,kind);
  const r=records.find(x=>String(x._id)===id) || (Array.isArray(dashData)&&dashData.find(x=>String(x._id)===id));
  return r&&r.childName?r.childName:'';
}
function setState(n){
  const caseDone=recDone(childIdOf(n,'case')), aDone=recDone(childIdOf(n,'a')), bDone=recDone(childIdOf(n,'b'));
  const filled=(caseDone?1:0)+(aDone?1:0)+(bDone?1:0);
  return {caseDone,aDone,bDone,filled,complete:caseDone&&aDone&&bDone};
}
/* first not-complete set WITHIN a facility's block. Locking is per-facility, so
   the four sites progress independently. */
function currentSetIn(h){ const [s,e]=setRange(h); for(let n=s;n<=e;n++){ if(!setState(n).complete) return n; } return e+1; }
function currentSet(){ return curHosp?currentSetIn(curHosp):1; }
/* The CASE is what moves a facility forward: as soon as a set's case is
   recorded, the next set's case opens. Its two controls stay open behind it
   for as long as needed, so a fieldworker can run all the cases first and come
   back for the controls later. */
function caseFrontierIn(h){ const [s,e]=setRange(h); for(let n=s;n<=e;n++){ if(!setState(n).caseDone) return n; } return e+1; }
function setUnlocked(n){ const h=hospForSet(n); return n<=caseFrontierIn(h); }
/* next set in the SAME facility whose case is still to be done */
function nextCaseAfter(n){
  const h=hospForSet(n), [s,e]=setRange(h);
  for(let k=n+1;k<=e;k++){ if(!setState(k).caseDone) return k; }
  return null;
}
function hospProgress(h){
  const [s,e]=setRange(h); let complete=0,cases=0,ctrls=0;
  for(let n=s;n<=e;n++){ const st=setState(n); if(st.complete)complete++; if(st.caseDone)cases++; ctrls+=(st.aDone?1:0)+(st.bDone?1:0); }
  return {complete,cases,ctrls,cur:currentSetIn(h),nextCase:caseFrontierIn(h)};
}

function renderSets(){
  if(!curHosp){ renderFacilities(); return; }

  const card=n=>{
    const st=setState(n), isNext=(n===cur);
    const cls = st.complete?'complete' : st.caseDone?'open' : isNext?'current' : 'locked';
    const badge = st.complete ? 'Complete'
                : st.caseDone ? ((st.aDone||st.bDone)?'1 control left':'Controls due')

    const nextK = st.complete ? '' : !st.caseDone ? (isNext?'case':'') : !st.aDone?'a':'b';
    return `<button class="set-card ${cls}" onclick="tapSet(${n})">
      <div class="sc-top"><span class="sc-no">Set ${n}</span><span class="sc-badge">${badge}</span></div>
      <div class="dots">

        <div class="${st.aDone?'d done':nextK==='a'?'d next':'d'}"></div>
        <div class="${st.bDone?'d done':nextK==='b'?'d next':'d'}"></div>
      </div>
      <div class="sc-lbl"><span>Case</span><span>Ctrl a</span><span>Ctrl b</span></div>
    </button>`;
  };
  let cards=''; for(let n=s;n<=e;n++) cards+=card(n);
  const p=hospProgress(h);
  const noteHtml = p.complete>=h.cases
    ? `All ${h.cases} sets complete for ${esc(h.name)} — ${h.cases} cases and ${h.cases*2} controls.`
    : cur>e
      ? `All ${h.cases} cases recorded. ${p.ctrls} of ${h.cases*2} controls done — open any set marked <b>Controls due</b> to finish it.`
      : `${p.cases} of ${h.cases} cases · ${p.ctrls} of ${h.cases*2} controls. <b>Set ${cur}</b> is the next case. Once a case is saved the next case opens straight away, so you can run the cases first and come back to any set marked <b>Controls due</b> later.`;
  app.innerHTML=hd+`<div class="body"><div class="list">
    <div class="set-sec"><span class="hn">Sets ${s}–${e}</span><span class="rg">${esc(h.district)}</span></div>
    <div class="sets-note">${noteHtml}</div>
    <div class="set-grid">${cards}</div>
  </div></div>`;
}
function tapSet(n){
  if(!setUnlocked(n)){ toast('Record the case for Set '+caseFrontierIn(hospForSet(n))+' first'); return; }
  renderSet(n);
}
function renderSet(n){
  curHosp=hospForSet(n);
  const st=setState(n), h=hospForSet(n);
  /* one combined form per person (child CRF + embedded caregiver section) */
  const slot=(kind,label)=>{
    const id=childIdOf(n,kind), isC=kind==='case';
    const done = kind==='case'?st.caseDone : kind==='a'?st.aDone : st.bDone;
    const name=childNameOf(n,kind);
    const locked=!isC && !st.caseDone;                 /* controls wait for the case */
    const icon=done?I.tick2:(isC?'CA':'C'+kind);
    const iCls=locked?'lock':(isC?'case':'ctrl');
    const sub=done?(name?esc(name)+' · recorded':'recorded'):(locked?'complete the case first':'consent, then child + caregiver');
    const status=done?`<span class="stt done">Done</span>`
               : locked?`<span class="stt wait">Case first</span>`
               : `<span class="stt go">Start</span>`;
    const click=done?`onclick="viewById('${id}')"`:locked?'':`onclick="startForm(${n},'${kind}')"`;
    return `<button class="slot ${done||!locked?'tap':'locked'}" ${click}>
      <span class="si ${done?(isC?'case':'ctrl'):iCls}">${icon}</span>
      <span class="st"><h3>${label}</h3><span class="cg">${sub}</span></span>
      ${status}</button>`;
  };
  const hd=`<div class="appbar"><button class="ico-btn" onclick="renderSets()">${I.back}</button>
    <div class="titles"><div class="eyebrow">${esc(h.code)} · matched set</div><div class="title">Set ${n}</div></div>
    <img class="bar-logo" src="${LOGO}" alt="ICF-SL"></div>`;
  app.innerHTML=hd+`<div class="body"><div class="list">
    <div class="set-head"><div class="id">Set ${n}${st.complete?' · complete':''}</div>
      <div class="meta">${esc(h.name)} · ${esc(h.district)}<br>One case and two matched controls. Each form covers the child (CRF) and its caregiver in one go. The case must be recorded before this set's controls open — the controls can be done later.</div></div>
    ${slot('case','Case '+n)}
    ${slot('a','Control '+n+'a')}
    ${slot('b','Control '+n+'b')}
  </div></div>`;
}
/* open a saved record straight from its ID */
function viewById(id){
  const i=records.findIndex(r=>String(r._id)===id);
  if(i>-1){ detail=i; renderRec(); return; }
  toast(id+' is recorded (on another device / the sheet)');
}
/* NOTHING is prefilled from a set's case into its controls. A control is a
   different child in a different household, often interviewed days later, so
   every caregiver, household and environmental answer is asked fresh. The only
   thing a control inherits from its case is the age group it must match.

   WITHIN one record it is the opposite: the caregiver section belongs to that
   same child, so anything already answered on the child's own form flows
   straight into it. Case -> that case's caregiver, control -> that control's
   caregiver, never across the two. Prefill only: every mirrored answer stays
   fully editable, and once it has been touched it is left alone. */
const MIRROR={ G7b:'A4b', G7c:'A4c', G10:'B6' };
function mirrorChildToCaregiver(){
  Object.keys(MIRROR).forEach(t=>{
    const v=ans[MIRROR[t]];
    if(v===undefined||v===null||String(v).trim()==='') return;
    if(ans[t]===undefined||String(ans[t]).trim()==='') ans[t]=v;
  });
}
function recById(id){ return records.find(r=>String(r._id)===id) || (Array.isArray(dashData)&&dashData.find(r=>String(r._id)===id)); }

function startForm(setNo,kind){
  curHosp=hospForSet(setNo);
  if(!setUnlocked(setNo)){ toast('Record the case for Set '+caseFrontierIn(curHosp)+' first'); return; }
  if(kind!=='case' && !setState(setNo).caseDone){ toast('Do the case first'); return; }
  const id=childIdOf(setNo,kind);
  if(recDone(id)){ viewById(id); return; }
  ans={ interviewer:interviewer||'', setNo:setNo,
        group: kind==='case'?'Case (severe malaria, admitted)':'Control (uncomplicated, OPD)',
        hospital:hospForSet(setNo).name, enrolDate:todayISO(), enrolTime:nowHM(), G0:todayISO(),
        CNdate:todayISO(), CNtime:nowHM() };
  if(kind!=='case'){ ans.matchCase=setNo; ans.ctrlSlot=kind; }
  ans.studyId=genStudyId(ans);
  PAGES=pages(); pg=0; lastVis=''; fuOpenDay=0;
  if(kind!=='case'){
    const caseRec=recById('Case '+setNo);
    ans._reqGroup = caseRec ? (caseRec.A2b || ageGroupOf(caseRec.A1)) : '';   /* control must match case age group */
  }
  saveDraft(); renderPage();
}

function ctl(q){
  const v=ans[q.id];
  if(q.type==='note') return q.html ? q.html : `<div class="skip-note">${esc(q.help||'')}</div>`;
  if(q.type==='check'){
    return `<div class="dec ${v?'on':''}" data-dq="${q.id}"><span class="bx">${I.tick}</span><span>${esc(q.decl||'')}</span></div>`;
  }

  if(q.type==='auto'){
    const val=formId(ans); ans.studyId=val;
    return `<div class="field"><input type="text" id="autoId" readonly value="${esc(val||idPlaceholder(ans))}"></div>`;
  }
  if(q.type==='choice'){
    let h='<div class="opts">'+q.options.map(o=>{
      const cls=q.yn?(o==='Yes'?'yes':(o==='No'?'no':'')):'';
      return `<div class="opt ${cls} ${v===o?'sel':''}" data-q="${q.id}" data-v="${esc(o)}"><span class="mark"></span><span>${esc(o)}</span></div>`;
    }).join('');
    if(q.other) h+=`<div class="opt ${v==='Other'?'sel':''}" data-q="${q.id}" data-v="Other"><span class="mark"></span><span>Other</span></div>`;
    h+='</div>';
    if(q.other) h+=`<div id="ob_${q.id}" style="${v==='Other'?'':'display:none'}"><div class="other-box"><input type="text" placeholder="Please specify…" data-k="${q.id}_other" value="${esc(ans[q.id+'_other']||'')}"></div></div>`;
    return h;
  }
  if(q.type==='multi'){
    const arr=Array.isArray(v)?v:[];
    let opts=q.options.slice();
    let h='<div class="chips">'+opts.map(o=>
      `<div class="chip ${arr.indexOf(o)>-1?'sel':''}" data-mq="${q.id}" data-v="${esc(o)}"><span class="bx">${I.tick}</span><span>${esc(o)}</span></div>`).join('');
    if(q.other) h+=`<div class="chip ${arr.indexOf('Other')>-1?'sel':''}" data-mq="${q.id}" data-v="Other"><span class="bx">${I.tick}</span><span>Other</span></div>`;
    if(q.none)  h+=`<div class="chip none ${arr.indexOf(q.none)>-1?'sel':''}" data-mq="${q.id}" data-v="${esc(q.none)}" data-none="1"><span class="bx">${I.tick}</span><span>${esc(q.none)}</span></div>`;
    h+='</div>';
    if(q.other) h+=`<div id="ob_${q.id}" style="${arr.indexOf('Other')>-1?'':'display:none'}"><div class="other-box"><input type="text" placeholder="Please specify…" data-k="${q.id}_other" value="${esc(ans[q.id+'_other']||'')}"></div></div>`;
    return h;
  }
  if(q.type==='progress'){
    let h='<div class="fu-grid">';
    for(let d=1;d<=5;d++){
      const done=fuDayDone(ans,d), unl=fuUnlocked(ans,d), open=(fuOpenDay===d)&&unl;
      const badge = done?'Complete' : !unl?'Locked' : open?'Open':'Start';
      const k='E28_d'+d+'_well', arr=wellArr(ans[k]);
      h+=`<div class="fu-card${done?' done':''}${unl?'':' locked'}${open?' open':''}" id="fu_${d}">
        <div class="fu-head" onclick="fuOpen(${d})">
          <span class="fu-n">${done?I.tick:d}</span><span>Day ${d}</span>
          <span class="fu-badge">${badge}</span>
        </div>
        ${open?`<div class="fu-body">
          <div class="sub-lbl">General wellbeing<span class="req">*</span></div>
          <div class="chips" style="margin-bottom:10px">${WELLBEING.map(o=>
            `<div class="chip ${arr.indexOf(o)>-1?'sel':''}" data-pw="${k}" data-v="${esc(o)}"><span class="bx">${I.tick}</span><span>${esc(o)}</span></div>`).join('')}</div>
          <div class="sub-lbl">Parasite density (/µL)<span class="req">*</span></div>
          <div class="field" style="margin-bottom:10px"><input type="number" min="0" placeholder="Parasite density" data-k="E28_d${d}_pd" value="${esc(ans['E28_d'+d+'_pd']||'')}"></div>
          <div class="sub-lbl">Haemoglobin (g/dL)<span class="req">*</span></div>
          <div class="field"><input type="number" step="0.1" min="0" placeholder="Hb (g/dL)" data-k="E28_d${d}_hb" value="${esc(ans['E28_d'+d+'_hb']||'')}"></div>
        </div>`:''}
      </div>`;
    }
    return h+'</div>';
  }
  if(q.type==='autofill'){
    const val=q.from(ans)||'';
    ans[q.id]=val;
    return `<div class="field"><input type="text" data-auto="${q.id}" readonly value="${esc(val||'— select a hospital first —')}"></div>`;
  }
  if(q.type==='agecalc'){
    const val=q.from(ans); ans[q.id]=(val===''?'':val);
    const over=(val!==''&&val>59);
    const txt = val===''?'— enter date of birth —':(val+' month'+(val===1?'':'s'));
    return `<div class="field"><input type="text" data-auto="${q.id}" readonly value="${esc(txt)}">
      ${over?`<div class="inelig">⚠ ${val} months — older than 59 months. This child is <b>not eligible</b>; enrolment cannot continue.</div>`:''}</div>`;
  }
  if(q.type==='agegroup'){
    const val=q.from(ans); ans[q.id]=val||'';
    const need = isControl(ans)&&ans._reqGroup ? ans._reqGroup : '';
    const mism = need && val && val!==need;
    return `<div class="field"><input type="text" data-auto="${q.id}" readonly value="${esc(val||'— enter date of birth —')}">
      ${need?`<div class="inelig ${mism?'':'ok'}" style="${mism?'':'background:var(--ok-bg);border-color:#bfe6c8;color:var(--ok)'}">Must match the case: <b>${esc(need)}</b>${mism?' — mismatch':''}</div>`:''}</div>`;
  }
  if(q.type==='select'){
    return `<div class="field"><select data-k="${q.id}">
      <option value="">— Select —</option>
      ${q.options.map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')}
    </select></div>`;
  }
  if(q.type==='textarea'){
    return `<div class="field"><textarea data-k="${q.id}" placeholder="${esc(q.ph||'')}">${esc(v||'')}</textarea></div>`;
  }
  const t=q.type==='number'?'number':q.type==='date'?'date':q.type==='time'?'time':'text';
  const attrs=[q.min!=null?`min="${q.min}"`:'',q.max!=null?`max="${q.max}"`:'',q.dec?'step="0.1"':'',q.ph?`placeholder="${esc(q.ph)}"`:''].join(' ');
  const inp=`<input type="${t}" ${attrs} data-k="${q.id}" value="${esc(v||'')}">`;
  return q.unit
    ? `<div class="field unit">${inp}<span class="u">${esc(q.unit)}</span></div>`
    : `<div class="field">${inp}</div>`;
}
function qCard(q){
  if(q.type==='note'&&q.html) return `<div class="q-card" id="qc_${q.id}">${q.html}</div>`;
  const num=q.n?`<span class="q-no">Q${q.n}</span>`:'';
  const req=(isOptional(q)||q.type==='auto'||q.type==='note')?'':'<span class="req">*</span>';
  return `<div class="q-card" id="qc_${q.id}">
    ${num}

    ${q.help&&q.type!=='note'?`<div class="q-help">${esc(q.help)}</div>`:''}

}
function renderPage(){

  applyDefaults();

function applyDefaults(){ prefillDistricts(); mirrorChildToCaregiver(); }
function wire(){
  const b=document.getElementById('fb'); if(!b) return;
  b.addEventListener('click',e=>{
    const o=e.target.closest('.opt');
    if(o){
      const qid=o.dataset.q, val=o.dataset.v;
      ans[qid]=val;
      document.querySelectorAll(`.opt[data-q="${qid}"]`).forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');
      const ob=document.getElementById('ob_'+qid); if(ob) ob.style.display=(val==='Other')?'':'none';
      afterChange(qid); return;
    }
    const d=e.target.closest('.dec');
    if(d){
      const qid=d.dataset.dq;
      if(ans[qid]){ delete ans[qid]; d.classList.remove('on'); }
      else { ans[qid]='Confirmed'; d.classList.add('on'); }
      afterChange(qid); return;
    }
    const pw=e.target.closest('.chip[data-pw]');
    if(pw){
      const k=pw.dataset.pw, val=pw.dataset.v;
      let arr=wellArr(ans[k]).slice();
      arr = arr.indexOf(val)>-1 ? arr.filter(x=>x!==val) : arr.concat([val]);
      ans[k]=arr;
      document.querySelectorAll(`.chip[data-pw="${k}"]`).forEach(x=>x.classList.toggle('sel',arr.indexOf(x.dataset.v)>-1));
      afterChange(k); return;
    }
    const c=e.target.closest('.chip');
    if(c){
      const qid=c.dataset.mq, val=c.dataset.v, q=byId(qid);
      let arr=Array.isArray(ans[qid])?ans[qid].slice():[];
      const on=arr.indexOf(val)>-1;
      if(c.dataset.none){                 /* "None" is exclusive */
        arr = on?[]:[val];
      }else{
        if(on) arr=arr.filter(x=>x!==val); else arr.push(val);
        if(q&&q.none) arr=arr.filter(x=>x!==q.none);   /* any real pick clears "None" */
      }
      ans[qid]=arr;
      document.querySelectorAll(`.chip[data-mq="${qid}"]`).forEach(x=>x.classList.toggle('sel',arr.indexOf(x.dataset.v)>-1));
      const ob=document.getElementById('ob_'+qid); if(ob) ob.style.display=(arr.indexOf('Other')>-1)?'':'none';
      afterChange(qid); return;
    }
  });
  b.addEventListener('input',e=>{
    const i=e.target.closest('[data-k]'); if(!i) return;
    ans[i.dataset.k]=i.value; afterChange(i.dataset.k);
  });
  b.addEventListener('change',e=>{
    const i=e.target.closest('select[data-k]'); if(!i) return;
    ans[i.dataset.k]=i.value; afterChange(i.dataset.k);
  });
}
function afterChange(qid){
  const card=document.getElementById('qc_'+String(qid).split('_')[0]);
  if(card) card.classList.remove('missing');
  /* a No on any of consent items 1 to 5 ends it there and then — the rest of
     the consent page is not asked and the form is never started */
  if(CONSENT_REQ.indexOf(qid)>-1 && ans[qid]==='No'){ renderConsentDeclined(qid); return; }
  const a=document.getElementById('autoId');
  if(a){ ans.studyId=formId(ans); a.value=ans.studyId||idPlaceholder(ans); }
  prefillDistricts();
  if(qid==='A1'){                                     /* DOB -> recompute age + group */
    if(isControl(ans) && ans._reqGroup){
      const g=ageGroupOf(ans.A1);
      if(g && g!==ans._reqGroup){
        const need=ans._reqGroup;
        delete ans.A1; delete ans.A2; delete ans.A2b;
        saveDraft(); renderPage();
        setTimeout(()=>toast('Wrong age group for control — must be '+need+' (same as the case). Date of birth reset.'),60);
        return;
      }
    }
    saveDraft(); renderPage(); return;
  }
  if(qid==='interviewer'){ interviewer=ans.interviewer; Store.set(ME_KEY,interviewer); }
  if(String(qid).indexOf('E28_d')===0) refreshFuCards();
  mirrorChildToCaregiver();
  /* a change may open or close later questions -> re-render this page */
  const dependents=PAGES[pg].items.some(q=>q.when);
  saveDraft();
  runFlags();
  if(dependents) rerenderIfVisibilityChanged();
}
/* District of residence is derived from the hospital and is READ-ONLY:
     Ola During -> Western Area Urban   Bo Government   -> Bo
     Koidu      -> Kono                 Magburaka       -> Tonkolili
   Recomputed on every change so it always tracks the selected hospital. */
function prefillDistricts(){
  ALL.filter(q=>q.type==='autofill').forEach(q=>{
    const v=q.from(ans)||'';
    ans[q.id]=v;
    const el=document.querySelector(`input[data-auto="${q.id}"]`);
    if(el) el.value=v||'— select a hospital first —';
  });
}

let lastVis='';
function rerenderIfVisibilityChanged(){
  const sig=PAGES[pg].items.map(q=>visible(q)?'1':'0').join('');
  if(sig!==lastVis){ lastVis=sig; clearHidden(); renderPage(); }
}
/* clear answers to questions that skip logic has hidden, so skipped
   questions never leave stale values behind in the record */
function clearHidden(){
  ALL.forEach(q=>{
    if(q.when && !q.when(ans)){
      delete ans[q.id]; delete ans[q.id+'_other'];
      if(q.type==='progress') for(let d=1;d<=5;d++){delete ans['E28_d'+d+'_well'];delete ans['E28_d'+d+'_pd'];delete ans['E28_d'+d+'_hb'];}
    }
  });
}

/* ---------- clinical range flags (warn, never block) ---------- */
const FLAGS=[
  {id:'D20', test:v=>v<5,     cls:'bad',  msg:'Hb < 5 g/dL — meets the WHO criterion for severe anaemia.'},
  {id:'D21', test:v=>v<2.2,   cls:'bad',  msg:'Glucose < 2.2 mmol/L — meets the WHO criterion for hypoglycaemia.'},
  {id:'C15', test:v=>v<90,    cls:'warn', msg:'SpO₂ below 90%.'},
  {id:'C12', test:v=>v>=37.5, cls:'warn', msg:'Fever present (≥ 37.5 °C).'},
  {id:'C11', test:v=>v<11.5,  cls:'warn', msg:'MUAC < 11.5 cm — severe acute malnutrition.'},
  {id:'A2',  test:v=>v>59,    cls:'bad',  msg:'Age above 59 months, outside the study age range (0 to 59 months).'}
];
function runFlags(){
  FLAGS.forEach(f=>{
    const el=document.getElementById('fl_'+f.id); if(!el) return;
    const v=parseFloat(ans[f.id]);
    el.innerHTML=(!isNaN(v)&&f.test(v))?`<div class="flag ${f.cls}">${esc(f.msg)}</div>`:'';
  });
  /* follow-up: say plainly what is still missing */
  const fu=document.getElementById('fl_E28');
  if(fu){
    if(!fuDayDone(ans,1)){
      fu.innerHTML=`<div class="flag warn">Open Day 1 and fill all three answers to record the follow-up.</div>`;
    }else{
      let half=0; for(let d=2;d<=5;d++) if(fuDayStarted(ans,d)&&!fuDayDone(ans,d)) half=d;
      const n=[1,2,3,4,5].filter(d=>fuDayDone(ans,d)).length;
      fu.innerHTML = half
        ? `<div class="flag warn">Day ${half} is started but not finished — complete all three answers or clear it.</div>`
        : `<div class="flag ok">${n} follow-up day${n===1?'':'s'} recorded.</div>`;
    }
  }

  /* a case should have at least one WHO sign (advisory only) */
  const el=document.getElementById('fl_C16');
  if(el&&isCase(ans)){
    const arr=Array.isArray(ans.C16)?ans.C16:[];

/* ---------- review ---------- */
function fmt(q){
  let v=ans[q.id];
  if(q.type==='progress'){
    const days=fuDays(ans);
    return days.length?'D'+days.join(', D')+' recorded':'—';
  }
  if(Array.isArray(v)){
    if(!v.length) return '—';
    return v.map(x=>x==='Other'&&ans[q.id+'_other']?'Other — '+ans[q.id+'_other']:x).join(', ');
  }
  if(v===undefined||v===null||String(v).trim()==='') return '—';
  if(q.other&&v==='Other'&&ans[q.id+'_other']) return 'Other — '+ans[q.id+'_other'];
  return String(v);
}
/* Follow-up is five days x three answers, so it is written out day by day
   instead of being summarised as "D1, D2 recorded". */
function fuFullRows(a){
  const days=fuDays(a);
  if(!days.length) return `<div class="rv-item"><span class="q">Daily follow-up</span><span class="a empty">—</span></div>`;
  let h='';
  days.forEach(d=>{
    const well=wellArr(a['E28_d'+d+'_well']).join(', ');
    h+=`<div class="rv-item"><span class="q">Day ${d} · general wellbeing</span><span class="a ${well?'':'empty'}">${esc(well||'—')}</span></div>`
     + `<div class="rv-item"><span class="q">Day ${d} · parasite density (/µL)</span><span class="a ${a['E28_d'+d+'_pd']?'':'empty'}">${esc(a['E28_d'+d+'_pd']||'—')}</span></div>`
     + `<div class="rv-item"><span class="q">Day ${d} · haemoglobin (g/dL)</span><span class="a ${a['E28_d'+d+'_hb']?'':'empty'}">${esc(a['E28_d'+d+'_hb']||'—')}</span></div>`;
  });
  return h;
}
/* Every question that applies to this record, in form order, with its answer.
   `ans` must already be pointing at the record being shown. */
function fullSheet(opts){
  opts=opts||{};
  let body='',cur='',asked=0,blank=0;
  ALL.filter(q=>visible(q)&&q.type!=='note'&&q.type!=='auto').forEach(q=>{
    if(q.sec!==cur){cur=q.sec;body+=`<div class="rv-sec">${esc(cur)}</div>`;}
    if(q.type==='progress'){
      body+=`<div class="rv-item"><span class="q">${esc(qText(q))}</span><span class="a">${esc(fmt(q))}</span></div>`+fuFullRows(ans);
      asked++; if(!fuDays(ans).length) blank++;
      return;
    }
    const val=fmt(q), miss=(val==='—'&&!isOptional(q));
    asked++; if(val==='—') blank++;
    body+=`<div class="rv-item"><span class="q">${esc(qText(q))}</span><span class="a ${opts.flag&&miss?'empty':(val==='—'?'empty':'')}">${esc(val)}</span></div>`;
  });
  return {body,asked,blank};
}

function submitRec(){
  /* last safety net: drop any answer whose question is currently skipped, so a
     value entered and then skipped past can never reach the record */
  clearHidden();
  ans.childName = fullName(ans.childFirst,ans.childMiddle,ans.childLast);
  ans.cgName    = fullName(ans.cgFirst,ans.cgMiddle,ans.cgLast);
  const dup=findDuplicate(ans);
  if(dup){ renderDuplicate(dup); return; }
  const rec=Object.assign({},ans,{
    _id:ans.studyId, _ts:new Date().toISOString(),
    _group:isCase(ans)?'Case':'Control',
    childName: ans.childName||'',
    cgName: ans.cgName||'',
    _whoSigns:(Array.isArray(ans.C16)?ans.C16:[]).filter(x=>x!=='None present').join('; '),
    _consent: consentGiven(ans)?'Given':'Incomplete',
    _synced:false                     /* saved here first — always */
  });
  records.push(rec); Store.set(REC_KEY,records); discardDraft();
  renderDone(rec);

  if(!GAS_URL){ setSync('warn','◍ Saved on this device only'); return; }
  if(!navigator.onLine){ setSync('queued','◍ No internet — queued, will sync automatically'); return; }
  setSync('checking','Sending to Google Sheet…');
  send(rec,(ok,status)=>{
    if(ok){
      rec._synced=true; rec._syncedAt=new Date().toISOString(); Store.set(REC_KEY,records);
      setSync('on', status==='duplicate' ? '☁ Already in Google Sheet' : '☁ Saved to Google Sheet');
      loadCounts();
    }else{
      rec._syncTries=1; rec._lastError=status||'failed'; Store.set(REC_KEY,records);
      setSync('queued','◍ Not sent — queued, will retry automatically');
    }
  });
}
/* =========================================================
   OFFLINE QUEUE / SYNC ENGINE
   ---------------------------------------------------------
   Every enrolment is written to this device FIRST and marked
   _synced:false. A background worker pushes unsynced records to
   Google Sheets and flips the flag on success. Nothing is ever
   lost to a bad connection: the queue survives an app close, and
   retries automatically when the network comes back.
   ========================================================= */
function send(rec,cb){
  if(!GAS_URL){cb&&cb(false,'no-url');return;}
  const fn='__w'+Date.now()+Math.floor(Math.random()*1e4); let done=false;
  const el=document.createElement('script');
  window[fn]=r=>{
    done=true; delete window[fn]; el.remove();
    /* a duplicate means the row is already in the sheet — treat as synced,
       so a half-completed earlier attempt cannot double-enter the child */
    const ok = !!(r && (r.status==='ok' || r.status==='duplicate'));
    cb&&cb(ok, r&&r.status);
  };
  el.onerror=()=>{if(done)return;delete window[fn];el.remove();cb&&cb(false,'network');};
  el.src=GAS_URL+(GAS_URL.indexOf('?')>-1?'&':'?')+'data='+encodeURIComponent(JSON.stringify(rec))+'&callback='+fn+'&t='+Date.now();
  document.body.appendChild(el);
  setTimeout(()=>{if(!done){try{delete window[fn];el.remove();}catch(e){}cb&&cb(false,'timeout');}},20000);
}

function pending(){ return records.filter(r=>!r._synced); }

/* ---------- pulling a new build from the server ----------
   Saved records, the outbox and any unfinished draft all live in localStorage,
   which an update never touches. The order below matters: the server is proved
   reachable BEFORE any cache is cleared, so a failed check can never leave the
   app with nothing to load from. */
async function checkForUpdate(){
  if(!navigator.onLine){
    toast('No internet. Connect first, then update.'); return;
  }
  const q=pending().length;
  if(!confirm('Update this app to the latest version from the server?\n\n'
    +'Nothing on this device is lost — your '+records.length+' saved record'+(records.length===1?'':'s')
    +(q?', the '+q+' still waiting to sync,':'')+' and any unfinished draft all stay.\n\n'
    +'The app will reload.')) return;

  if(ans&&ans.studyId) saveDraft();     /* never lose a form that is open */
  toast('Updating…');

  let fresh;
  try{
    const res=await fetch('./index.html?u='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    fresh=await res.text();
    if(!fresh||fresh.length<1000) throw new Error('empty response');
  }catch(e){
    toast('Could not reach the server. The app was not updated.'); return;
  }

  /* only now is it safe to throw the old copy away */
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.update().catch(()=>{})));
    }
    if(window.caches){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){ /* cache clearing is best effort — the reload below still works */ }

  Store.set(UPD_KEY,new Date().toISOString());
  toast('Updated. Reloading…');
  setTimeout(()=>{
    location.replace(location.href.split('#')[0].split('?')[0]+'?u='+Date.now());
  },600);
}
function lastUpdatedText(){
  const t=Store.get(UPD_KEY,'');
  if(!t) return '';
  const d=new Date(t); if(isNaN(d)) return '';
  return ' · updated '+d.toISOString().slice(0,10)+' '+d.toTimeString().slice(0,5);
}

let syncing=false;
/* Push the queue one record at a time (Apps Script serialises writes anyway,
   and one-at-a-time keeps a weak connection from dropping the whole batch). */
function syncQueue(cb,onProgress){
  if(syncing){ cb&&cb(0,0); return; }
  const q=pending();
  if(!GAS_URL||!q.length||!navigator.onLine){ cb&&cb(0,q.length); return; }
  syncing=true;
  let sent=0, i=0;
  const step=()=>{
    if(i>=q.length){
      syncing=false; Store.set(REC_KEY,records);
      if(sent) loadCounts();
      cb&&cb(sent,pending().length);
      return;
    }
    const rec=q[i];
    onProgress&&onProgress(i+1,q.length);
    send(rec,(ok,status)=>{
      if(ok){
        rec._synced=true; rec._syncedAt=new Date().toISOString(); sent++;
        Store.set(REC_KEY,records);
      }else{
        rec._syncTries=(rec._syncTries||0)+1;
        rec._lastError=status||'failed';
      }
      i++;
      /* stop early if the network is clearly gone — keep the rest queued */
      if(!ok && (status==='network'||status==='timeout') && !navigator.onLine){
        syncing=false; Store.set(REC_KEY,records); cb&&cb(sent,pending().length); return;
      }
      setTimeout(step,300);
    });
  };
  step();
}

/* Auto-sync: on load, when the browser regains connectivity, when the app is
   brought back to the foreground, and every 60s as a safety net. */
function autoSync(){ if(GAS_URL&&navigator.onLine&&pending().length) syncQueue(n=>{ if(n) refreshSyncUI(); }); }
window.addEventListener('online', ()=>{ toast('Back online — syncing…'); autoSync(); });
window.addEventListener('offline',()=>{ refreshSyncUI(); });
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) autoSync(); });
setInterval(autoSync,60000);

function refreshSyncUI(){

  else if(document.querySelector('.list')) renderList();
}
function syncNow(){
  if(!GAS_URL){ toast('Connect a Google Sheet first'); return; }
  if(!navigator.onLine){ toast('No internet connection — will sync automatically'); return; }
  const n=pending().length;
  if(!n){ toast('Everything is already synced'); return; }
  toast('Syncing '+n+' record'+(n===1?'':'s')+'…');
  syncQueue((sent,left)=>{
    toast(sent? sent+' synced'+(left?', '+left+' still pending':'') : 'Could not reach Google Sheets');
    refreshSyncUI();
  });
}

/* =========================================================

/* Follow-up is recorded per day (wellbeing / parasite density / Hb). A day
   counts as done when any of the three is filled. Cases only. */
function fuDays(r){
  const d=[];
  for(let i=1;i<=5;i++){
    const w=r['E28_d'+i+'_well'];
    const has=(Array.isArray(w)?w.length>0:!!w) || (r['E28_d'+i+'_pd']!==undefined&&r['E28_d'+i+'_pd']!=='')
             || (r['E28_d'+i+'_hb']!==undefined&&r['E28_d'+i+'_hb']!=='');
    if(has) d.push(i);
  }
  return d;
}
function fuLabel(r){ const d=fuDays(r); return d.length? 'Follow-up: D'+d.join(', D') : 'No follow-up'; }

        <span class="pill ${done?'ctrl':'case'}">${done?d.length+'/5':'NONE'}</span></div>`;
    }).join('')
    : '<div style="font:400 12.5px var(--body);color:var(--muted);padding:14px 0">No cases on this device yet.</div>';
  app.innerHTML=hd+`<div class="body"><div class="list">
