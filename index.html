        <div class="av">${esc(r._id||'?')}</div>
        <div class="m"><div class="t">${esc(line1)}</div>
          <div class="s">${r.cgName?'Caregiver: '+esc(r.cgName)+' · ':''}${esc(r.hospital||'')}${c?' · '+esc(fuLabel(r)):''}</div></div>
        <span class="pill ${c?'case':'ctrl'}">${c?'CASE':'CONTROL'}</span>
        <span class="sdot ${r._synced?'ok':'wait'}" title="${r._synced?'Synced to Google Sheets':'Not yet synced'}"></span></div>`;}).join('')
      :'<div style="font:400 12.5px var(--body);color:var(--muted);padding:14px 0">No records in this filter.</div>'}
    </div>
    ${pending().length?`<button class="btn btn-primary btn-block" style="margin-bottom:11px" onclick="syncNow()">
        Resubmit ${pending().length} unsynced record${pending().length===1?'':'s'}</button>`:''}
    <button class="btn btn-ghost btn-block btn-sm" style="margin-bottom:11px" onclick="openFollowUp()">Follow-up status by case</button>
    <div class="tools">
      <button class="btn btn-ghost" onclick="exportCSV(lFilt().map(x=>x.r),'severe_malaria.csv')">Export CSV</button>
      <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
    </div></div></div>`;
}
function openRec(i){detail=i;renderRec();}
function renderRec(){
  const r=records[detail]; if(!r){renderList();return;}
  const c=String(r._group)==='Case';
  const save=ans; ans=r;    /* reuse visibility + fmt against this record */
  const sheet=fullSheet(); const body=sheet.body;
  ans=save;
  const pill = `<span class="tag-pill ${c?'case':'ctrl'}">${c?'CASE':'CONTROL'}</span>`;
  const sub = esc(r.childName||'')+(r.cgName?' · caregiver: '+esc(r.cgName):'');
  app.innerHTML=`<div class="appbar"><button class="ico-btn" onclick="renderList()">${I.back}</button>
      <div class="titles"><div class="eyebrow">Enrolment</div><div class="title">${esc(r._id)}</div></div>
      ${pill}</div>
    <div class="body"><div class="rv">
      <div class="rv-head"><div class="id">${esc(r._id)}</div>
        <div class="meta">${sub?sub+'<br>':''}${esc(r.hospital||'')} · ${esc(r.enrolDate||'')} ${esc(r.enrolTime||'')}<br>${esc(r.interviewer||'')}${c?'<br>'+esc(fuLabel(r)):''}</div></div>
      <div class="rv-count">Every question asked for this record — ${sheet.asked} in total.</div>
      ${body}
      ${c?`<button class="btn btn-ghost btn-block btn-sm" style="margin-top:12px" onclick="openFollowUp()">Follow-up status by case</button>`:''}
    </div></div>`;
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function openDash(retry){
  if(!GAS_URL){dashSrc='none';drawDash();return;}
  dashLoading=true;drawDash();
  fetchLive(rows=>{
    if(rows&&Array.isArray(rows)){dashData=rows;dashSrc='live';dashLoading=false;drawDash();return;}
    if(!retry){openDash(true);return;}
    dashLoading=false;dashSrc='error';drawDash();
  });
}
function fetchLive(cb){
  const fn='__c'+Date.now(); const s=document.createElement('script'); let done=false;
  window[fn]=d=>{done=true;delete window[fn];s.remove();cb(d);};
  s.onerror=()=>{if(done)return;delete window[fn];s.remove();cb(null);};
  s.src=GAS_URL+(GAS_URL.indexOf('?')>-1?'&':'?')+'callback='+fn+'&t='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{if(!done){try{delete window[fn];s.remove();}catch(e){}cb(null);}},20000);
}
function setDF(f){dashF=f;drawDash();}
function dFilt(){
  if(dashF==='all')return dashData;
  return dashData.filter(r=>String(r._group)===(dashF==='case'?'Case':'Control'));
}
function dist(data,field,order){
  const c={};
  data.forEach(r=>{const v=r[field]; if(v!==''&&v!=null) c[v]=(c[v]||0)+1;});
  let keys=order?order.filter(k=>c[k]):Object.keys(c).sort((a,b)=>c[b]-c[a]);
  const tot=keys.reduce((s,k)=>s+c[k],0)||1;
  return keys.map(k=>({k,n:c[k],pct:Math.round(c[k]/tot*100)}));
}
function bars(title,rows,red){
  if(!rows.length) return `<div class="card"><h4><span class="dot"></span>${esc(title)}</h4><div style="font:400 12px var(--body);color:var(--muted)">No data yet.</div></div>`;
  return `<div class="card"><h4><span class="dot"></span>${esc(title)}</h4>`+rows.map(r=>
    `<div class="bar-row"><div class="bar-top"><span class="k">${esc(r.k)}</span><span class="v">${r.n} · ${r.pct}%</span></div>
     <div class="bar-track"><div class="bar-fill ${red?'r':''}" style="width:${r.pct}%"></div></div></div>`).join('')+`</div>`;
}
function signCounts(data){
  const c={};
  data.forEach(r=>String(r._whoSigns||'').split(';').map(s=>s.trim()).filter(Boolean).forEach(s=>c[s]=(c[s]||0)+1));
  const tot=data.length||1;
  return Object.keys(c).sort((a,b)=>c[b]-c[a]).map(k=>({k,n:c[k],pct:Math.round(c[k]/tot*100)}));
}
function drawDash(){
  const hd=`<div class="appbar"><button class="ico-btn" onclick="renderHome()">${I.home}</button>
    <div class="titles"><div class="eyebrow">Live · Google Sheets</div><div class="title">Dashboard</div></div>
    <img class="bar-logo" src="${LOGO}" alt="ICF-SL">
    <button class="ico-btn" onclick="openDash()">${I.refresh}</button></div>`;
  if(dashSrc==='none'){
    app.innerHTML=hd+`<div class="body"><div class="list"><div class="empty"><div class="ic">${I.cloud}</div>
      <h3>Not connected</h3><p>Connect a Google Sheet to see live results from all sites.</p>
      <button class="btn btn-primary btn-block" onclick="setGAS()">Connect Google Sheet</button></div></div></div>`;return;
  }
  if(dashLoading){
    app.innerHTML=hd+`<div class="body"><div class="list"><div class="empty"><div class="spin"></div>
      <h3 style="margin-top:18px">Loading live data…</h3><p>Fetching enrolments from Google Sheets.</p></div></div></div>`;return;
  }
  if(dashSrc==='error'){
    app.innerHTML=hd+`<div class="body"><div class="list"><div class="empty"><div class="ic">${I.cloud}</div>
      <h3>Couldn’t load live data</h3><p>Usually a slow connection, or the app opened inside another app’s browser. Open it in Chrome and retry.</p>
      <button class="btn btn-primary btn-block" onclick="openDash()">Retry</button>
      <div style="height:10px"></div>
      <button class="btn btn-ghost btn-block" onclick="openList()">View this device’s records</button></div></div></div>`;return;
  }
  if(!dashData.length){
    app.innerHTML=hd+`<div class="body"><div class="list"><div class="empty"><div class="ic">${I.empty}</div>
      <h3>No enrolments yet</h3><p>Submitted records will appear here live.</p>
      <button class="btn btn-primary btn-block" onclick="startNew()">Enrol a child</button></div></div></div>`;return;
  }
  const data=dFilt(), n=data.length;
  const cases=dashData.filter(r=>String(r._group)==='Case');
  const ctrls=dashData.filter(r=>String(r._group)==='Control');
  const died=cases.filter(r=>r.F29==='Died').length;
  const cfr=cases.length?Math.round(died/cases.length*100):0;
  const ratio=cases.length?(ctrls.length/cases.length).toFixed(1):'—';

  app.innerHTML=hd+`<div class="body"><div class="list">
    <h2>Live dashboard</h2>
    <div class="sub">${dashData.length} enrolment${dashData.length===1?'':'s'} in Google Sheets</div>
    <div class="seg">
      <button class="${dashF==='all'?'on':''}" onclick="setDF('all')">All</button>
      <button class="${dashF==='case'?'on':''}" onclick="setDF('case')">Cases</button>
      <button class="${dashF==='ctrl'?'on':''}" onclick="setDF('ctrl')">Controls</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n r">${cases.length}</div><div class="l">Cases (target 115)</div></div>
      <div class="stat"><div class="n g">${ctrls.length}</div><div class="l">Controls (target 230)</div></div>
      <div class="stat"><div class="n">${ratio}</div><div class="l">Control : case ratio (target 2.0)</div></div>
      <div class="stat"><div class="n r">${cfr}%</div><div class="l">Case fatality (${died}/${cases.length})</div></div>
    </div>
    ${bars('Enrolments by hospital',dist(data,'hospital',HOSPITALS.map(h=>h.name)))}
    ${bars('WHO severity signs (cases)',signCounts(cases),true)}
    ${bars('Outcome (cases)',dist(cases,'F29',['Recovered','Died','Referred','Absconded']),true)}
    ${bars('Time to care-seeking',dist(data,'G13',['Same day','Next day','2 days','3 or more days']))}
    ${bars('Slept under a net last night',dist(data,'G21',['Yes','No']))}
    ${bars('Referral mode',dist(data,'A5'))}
    <div class="tools"><button class="btn btn-ghost btn-block" onclick="exportCSV(dFilt(),'severe_malaria_live.csv')">Export CSV</button></div>
  </div></div>`;
}

/* =========================================================
   TOOLS
   ========================================================= */
function csvCols(){
  const meta=['_id','childName','cgName','_ts','_group','hospital','enrolDate','enrolTime','interviewer','_consent','_synced'];
  const qs=[]; const hdr=[];
  ALL.forEach(q=>{
    if(q.type==='note'||q.type==='auto') return;
    if(q.type==='progress'){
      for(let d=1;d<=5;d++){ qs.push('E28_d'+d+'_well','E28_d'+d+'_pd','E28_d'+d+'_hb');
        hdr.push('Day '+d+' wellbeing','Day '+d+' parasite density','Day '+d+' Hb'); }
      return;
    }
    qs.push(q.id); hdr.push(q.qc?q.q+' / '+q.qc:q.q);
    if(q.other){ qs.push(q.id+'_other'); hdr.push(q.q+' — Other (specify)'); }
  });
  return {cols:meta.concat(qs), hdr:['ID','Child name','Caregiver name','Submitted at','Group','Hospital','Enrolment date','Enrolment time','Interviewer','Consent','Synced to Sheets'].concat(hdr)};
}
function exportCSV(data,name){
  if(!data||!data.length){toast('No data to export');return;}
  const {cols,hdr}=csvCols();
  const cell=v=>{ if(Array.isArray(v)) v=v.join('; '); v=v==null?'':String(v);
    return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const csv=[hdr.join(',')].concat(data.map(r=>cols.map(c=>cell(r[c])).join(','))).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;
  document.body.appendChild(a);a.click();a.remove();toast('CSV exported');
}
function clearAll(){
  const q=pending().length;
  if(q && !confirm(q+' record'+(q===1?' has':'s have')+' NOT been uploaded to Google Sheets yet.\n\nDeleting now will lose '+(q===1?'it':'them')+' permanently. Sync first?\n\nPress Cancel to go back and sync.')) return;
  if(!confirm('Delete all '+records.length+' enrolments stored on this device?')) return;
  records=[];Store.set(REC_KEY,records);renderList();
}

renderHome();
autoSync();   /* flush anything left over from a previous session */
</script>

<!-- ── PWA: service worker + install prompt ─────────────────── -->
<script>
(function(){
  // running as an installed app?
  window.__isStandalone = window.matchMedia('(display-mode: standalone)').matches
                          || window.navigator.standalone === true;

  // Register the service worker (offline support)
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(e){ console.warn('SW register failed', e); });
    });
  }

  var deferred=null, DISMISS_KEY='sm_pwa_dismissed';
  function dismissed(){ try{ return localStorage.getItem(DISMISS_KEY)==='1'; }catch(e){ return false; } }
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // Called by the top banner Install button AND the home-screen Install button
  window.installApp = function(){
    if(window.__isStandalone){ if(window.toast) toast('The app is already installed.'); return; }
    if(deferred){
      deferred.prompt();
      deferred.userChoice.finally(function(){ deferred=null; hideBanner(); });
      return;
    }
    if(isIOS){
      if(window.toast) toast('On iPhone: tap the Share button, then “Add to Home Screen”.');
      return;
    }
    if(window.toast) toast('Open your browser menu and choose “Install app” / “Add to Home screen”. (Requires the app to be opened from its web address, not a downloaded file.)');
  };

  function showBanner(){
    if(document.getElementById('pwaBanner')||dismissed()||window.__isStandalone) return;
    var b=document.createElement('div');
    b.id='pwaBanner';
    b.setAttribute('style','position:fixed;top:0;left:0;right:0;z-index:99999;display:flex;align-items:center;gap:10px;'
      +'background:#1b6499;color:#fff;padding:10px 12px;font:600 12.5px/1.3 -apple-system,Segoe UI,Roboto,sans-serif;'
      +'box-shadow:0 6px 20px rgba(12,39,64,.35);');
    b.innerHTML='<span style="flex:1">Install this app for offline data collection</span>'
      +'<button id="pwaInstall" style="background:#c8991a;color:#fff;border:none;padding:8px 16px;border-radius:20px;font:700 12px/1 inherit;cursor:pointer">Install</button>'
      +'<button id="pwaClose" aria-label="Dismiss" style="background:transparent;color:#fff;border:none;font-size:18px;line-height:1;cursor:pointer;padding:4px 6px">&times;</button>';
    document.body.appendChild(b);
    document.getElementById('pwaInstall').onclick=function(){ window.installApp(); };
    document.getElementById('pwaClose').onclick=function(){ try{ localStorage.setItem(DISMISS_KEY,'1'); }catch(e){} hideBanner(); };
  }
  function hideBanner(){ var b=document.getElementById('pwaBanner'); if(b) b.remove(); }

  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; showBanner(); });
  window.addEventListener('appinstalled', function(){
    deferred=null; hideBanner(); window.__isStandalone=true;
    try{ localStorage.setItem(DISMISS_KEY,'1'); }catch(e){}
    if(window.toast) toast('App installed. You can open it from your home screen.');
  });
})();
</script>
